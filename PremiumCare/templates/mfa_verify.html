<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Two-Factor Verification — {{ practice_name }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background:#0f2347; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    .mfa-card { background:#fff; border-radius:20px; padding:44px 40px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .mfa-icon { width:64px; height:64px; border-radius:18px; background:linear-gradient(135deg,#1d4ed8,#2d6fd4); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
    .token-input { font-size:1.8rem; font-weight:800; text-align:center; letter-spacing:.3em; border:2px solid #e2e8f0; border-radius:12px; padding:14px; width:100%; font-family:monospace; transition:border-color .15s; }
    .token-input:focus { border-color:#2d6fd4; outline:none; box-shadow:0 0 0 3px rgba(45,111,212,.1); }
    .btn-verify { width:100%; padding:13px; background:linear-gradient(135deg,#1d4ed8,#2d6fd4); color:#fff; border:none; border-radius:10px; font-size:.95rem; font-weight:700; cursor:pointer; margin-top:16px; }
    .btn-verify:hover { filter:brightness(.95); }
  </style>
</head>
<body>
<div class="mfa-card">
  <div class="mfa-icon"><i class="bi bi-shield-lock-fill text-white fs-3"></i></div>
  <h5 class="text-center fw-bold mb-1" style="color:#0f172a;">{{ t.h_two_factor }}</h5>
  <p class="text-center text-muted mb-4" style="font-size:.85rem;">{{ t.misc_open_auth }}</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} py-2 px-3 mb-3" style="font-size:.83rem;border-radius:8px;">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" autocomplete="off">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="text" name="token" class="token-input" placeholder="000000"
           maxlength="6" pattern="[0-9]{6}" inputmode="numeric" required autofocus>
    <button type="submit" class="btn-verify">
      <i class="bi bi-check-circle me-2"></i>Verify
    </button>
  </form>

  <div class="text-center mt-4">
    <a href="/logout" style="font-size:.78rem;color:#94a3b8;text-decoration:none;">
      <i class="bi bi-arrow-left me-1"></i>Back to login
    </a>
  </div>
</div>
<script>
  // Auto-format and submit on 6 digits
  document.querySelector('input[name="token"]').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g,'').slice(0,6);
    if (this.value.length === 6) this.closest('form').submit();
  });
</script>
</body>
</html>
