<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checked In — {{ practice_name }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body { background:#0f2347; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:-apple-system,sans-serif; }
    .confirm-card { background:#fff; border-radius:20px; padding:48px 40px; text-align:center; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .check-circle { width:80px;height:80px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:2rem;color:#fff; }
  </style>
</head>
<body>
<div class="confirm-card">
  <div class="check-circle"><i class="bi bi-check-lg"></i></div>
  <h4 style="font-weight:900;color:#0f172a;margin-bottom:8px;">{{ t.h_checkin_title }}</h4>
  <p style="color:#64748b;font-size:.9rem;margin-bottom:28px;">{{ t.h_please_wait }}</p>
  <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:16px;font-size:.85rem;color:#166534;margin-bottom:24px;">
    <i class="bi bi-info-circle me-2"></i>Your reason for visit has been sent to the doctor.
  </div>
  <a href="/kiosk" style="display:block;padding:14px;background:linear-gradient(135deg,#1d4ed8,#2d6fd4);color:#fff;border-radius:12px;font-weight:800;text-decoration:none;font-size:.95rem;">
    Return to Check-In
  </a>
</div>
<script>setTimeout(function(){ window.location='/kiosk'; }, 8000);</script>
</body>
</html>
